# ============================================================
# Sales Prospecting Automation - 設定ファイル
# ============================================================

# Google Sheets設定
google_sheets:
  spreadsheet_id: "YOUR_SPREADSHEET_ID"  # Google SheetsのID
  sales_sheet_name: "営業リスト"
  excluded_sheet_name: "対象外ログ"

# AI API設定
ai:
  provider: "anthropic"  # "anthropic" or "openai"
  anthropic_api_key_env: "ANTHROPIC_API_KEY"
  openai_api_key_env: "OPENAI_API_KEY"
  model_anthropic: "claude-opus-4-7"
  model_openai: "gpt-4o"
  max_tokens: 2000

# 検索API設定
search:
  provider: "serpapi"  # "serpapi" or "google_cse"
  serpapi_key_env: "SERPAPI_KEY"
  google_cse_key_env: "GOOGLE_CSE_KEY"
  google_cse_id_env: "GOOGLE_CSE_ID"
  results_per_keyword: 10  # 1キーワードあたりの取得件数

# Gmail設定
gmail:
  enabled: true  # Gmail下書き作成のON/OFF
  from_name: "河野 / RAHA KENYA - 合同会社Asante Sana"

# スクレイピング設定
scraper:
  request_delay_seconds: 2       # リクエスト間の待機時間（秒）
  timeout_seconds: 15            # タイムアウト
  max_retries: 2                 # リトライ回数
  user_agent: "Mozilla/5.0 (compatible; SalesProspecting/1.0; +https://rahakenya.com)"

# 除外ドメイン（検索結果から除外するドメイン）
excluded_domains:
  - "amazon.co.jp"
  - "rakuten.co.jp"
  - "yahoo.co.jp"
  - "google.com"
  - "wikipedia.org"
  - "instagram.com"
  - "tiktok.com"
  - "youtube.com"
  - "twitter.com"
  - "x.com"
  - "facebook.com"
  - "linkedin.com"
  - "indeed.com"
  - "glassdoor.com"
  - "wantedly.com"
  - "en-gage.net"
  - "mynavi.jp"
  - "rikunabi.com"
  - "base.shop"
  - "stores.jp"
  - "minne.com"
  - "creema.com"
  - "note.com"
  - "ameblo.jp"

# 除外キーワード（ページ内容から対象外を判定）
excluded_keywords:
  - "営業メールはお断り"
  - "営業目的のお問い合わせはお断り"
  - "営業お断り"
  - "セールス目的はお断り"
  - "営業・勧誘はお断り"
  - "営業活動を目的とした"
  - "営業メールお断り"

