<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>求人原稿 自動生成｜NFA様 デモ</title>
<style>
:root{--navy:#13294b;--blue:#1f5fa8;--teal:#1aa3a3;--bg:#f4f6fa;--card:#fff;--ink:#1f2733;--soft:#5b6675;--line:#e2e7ef;}
*{box-sizing:border-box;margin:0;padding:0;font-family:"Hiragino Kaku Gothic ProN","Yu Gothic","Meiryo",sans-serif}
body{background:var(--bg);color:var(--ink);line-height:1.65;padding:0 0 60px}
header{background:linear-gradient(120deg,var(--navy),var(--teal));color:#fff;padding:22px 30px}
header h1{font-size:22px}header p{font-size:13px;opacity:.9;margin-top:4px}
.tag{display:inline-block;background:rgba(255,255,255,.18);padding:3px 10px;border-radius:20px;font-size:12px;margin-top:8px}
.wrap{max-width:1180px;margin:22px auto;padding:0 20px;display:grid;grid-template-columns:340px 1fr;gap:20px}
@media(max-width:820px){.wrap{grid-template-columns:1fr}}
.panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 20px}
.panel h2{font-size:15px;color:var(--navy);margin-bottom:12px}
label{display:block;font-size:12.5px;color:var(--soft);margin:10px 0 3px;font-weight:700}
input,select,textarea{width:100%;font-family:inherit;font-size:13.5px;padding:8px 10px;border:1.5px solid var(--line);border-radius:8px}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--blue)}
button{font-family:inherit;font-size:14px;font-weight:700;border:none;border-radius:8px;padding:11px 18px;cursor:pointer;width:100%;margin-top:16px;background:var(--blue);color:#fff}
button:hover{background:#19508f}
.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px}
.chip{font-size:12px;border:1.5px solid var(--line);border-radius:18px;padding:4px 11px;cursor:pointer;user-select:none}
.chip.on{background:var(--teal);color:#fff;border-color:var(--teal)}
.out{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:0;overflow:hidden}
.out .bar{display:flex;gap:6px;border-bottom:1px solid var(--line);padding:10px 14px;flex-wrap:wrap;align-items:center}
.tab{font-size:12.5px;padding:6px 12px;border-radius:7px;cursor:pointer;color:var(--soft);font-weight:700}
.tab.on{background:#eef4fb;color:var(--blue)}
.copy{margin-left:auto;font-size:12px;padding:6px 12px;border:1.5px solid var(--blue);color:var(--blue);background:#fff;border-radius:7px;cursor:pointer;width:auto;margin-top:0}
.doc{padding:20px 24px;font-size:13.5px;white-space:pre-wrap;min-height:380px}
.doc h3{color:var(--navy);font-size:17px;margin:2px 0 10px}
.doc .catch{color:var(--teal);font-weight:800;font-size:15px;margin-bottom:10px}
.doc strong{color:var(--navy)}
.note{font-size:11.5px;color:var(--soft);padding:0 24px 18px}
.empty{color:var(--soft);text-align:center;padding:120px 20px;font-size:14px}
</style>
</head>
<body>
<header>
  <h1>求人原稿 自動生成ツール</h1>
  <p>職種・条件・特徴を入れるだけで、媒体別の求人原稿・スカウト文・SNS投稿を一括生成します。</p>
  <span class="tag">株式会社エヌエフエー様 ご提案デモ ｜ AI研修サンプル</span>
</header>

<div class="wrap">
  <div class="panel">
    <h2>求人条件を入力</h2>
    <label>職種</label>
    <input id="job" value="倉庫内ピッキング・仕分け">
    <label>勤務地</label>
    <input id="place" value="東京都大田区（蒲田駅より徒歩10分）">
    <label>時給</label>
    <input id="wage" value="1,450円〜（残業25%増）">
    <label>勤務時間 / シフト</label>
    <input id="time" value="9:00〜18:00／週4日〜OK・シフト相談可">
    <label>ターゲット層</label>
    <select id="target">
      <option>未経験・フリーター歓迎</option>
      <option>主婦(夫)・扶養内</option>
      <option>シニア・60代活躍中</option>
      <option>外国籍・日本語日常会話OK</option>
      <option>Wワーク・副業</option>
    </select>
    <label>アピールしたい特徴（複数選択可）</label>
    <div class="chips" id="feats"></div>
    <label>トーン</label>
    <select id="tone">
      <option>親しみやすく・カジュアル</option>
      <option>丁寧・安心感重視</option>
      <option>元気・テンション高め</option>
    </select>
    <button onclick="gen()">▶ 原稿を自動生成</button>
  </div>

  <div class="out">
    <div class="bar" id="bar" style="display:none">
      <span class="tab on" data-t="ad" onclick="tab('ad')">求人媒体原稿</span>
      <span class="tab" data-t="scout" onclick="tab('scout')">スカウトメール</span>
      <span class="tab" data-t="sns" onclick="tab('sns')">SNS投稿</span>
      <span class="copy" onclick="copyDoc()">📋 コピー</span>
    </div>
    <div id="doc" class="doc"><div class="empty">← 左の条件を入れて「自動生成」を押すと、3種類の原稿がここに表示されます。</div></div>
    <div class="note" id="note"></div>
  </div>
</div>

<script>
const FEATURES=["未経験OK","日払い・週払い","交通費支給","社員登用あり","研修制度充実","空調完備・快適","食堂・休憩室あり","髪型自由","即日勤務OK","残業少なめ","車・バイク通勤可","友達と応募OK"];
let chosen=new Set(["未経験OK","日払い・週払い","交通費支給","研修制度充実"]);
const feancEl=document.getElementById("feats");
function renderFeats(){feancEl.innerHTML=FEATURES.map(f=>`<span class="chip ${chosen.has(f)?'on':''}" onclick="toggle('${f}')">${f}</span>`).join("")}
function toggle(f){chosen.has(f)?chosen.delete(f):chosen.add(f);renderFeats()}
renderFeats();

let docs={};let cur="ad";
const pick=(a,seed)=>a[seed%a.length];
function gen(){
  const job=val("job"),place=val("place"),wage=val("wage"),time=val("time"),target=val("target"),tone=val("tone");
  const f=[...chosen];
  const seed=(job+place+wage+tone).length;
  // キャッチコピー候補（トーン別）
  const catchByTone={
    "親しみやすく・カジュアル":[`未経験から始める${job}♪`,`コツコツ作業が好きな方、集まれ！`,`まずは“やってみる”からでOK。`],
    "丁寧・安心感重視":[`安心の研修付き。${job}のお仕事`,`はじめてでも大丈夫。丁寧にサポートします`,`長く続けられる職場をお探しの方へ`],
    "元気・テンション高め":[`今スグ働ける！${job}スタッフ大募集!!`,`シフト自由★稼ぎたい人にピッタリ!`,`仲間と一緒に楽しく働こう!!`],
  };
  const greet=tone==="元気・テンション高め"?"！":"。";
  const tgt={"未経験・フリーター歓迎":"未経験の方・フリーターの方","主婦(夫)・扶養内":"扶養内で働きたい主婦(夫)の方","シニア・60代活躍中":"60代まで幅広い世代の方","外国籍・日本語日常会話OK":"日本語で日常会話ができる外国籍の方","Wワーク・副業":"Wワーク・副業をお探しの方"}[target];
  const catch_=pick(catchByTone[tone],seed);
  const featLines=f.map(x=>"　✓ "+x).join("\n");
  const featInline=f.slice(0,4).join("／");

  docs.ad=
`【${job}】${place}\n`+
`<<catch>>${catch_}<</catch>>\n\n`+
`<<b>>◆ お仕事内容<</b>>\n`+
`${place}でのかんたんな${job}のお仕事です${greet}\nマニュアル・研修があるので、はじめての方でも安心してスタートできます${greet}\n\n`+
`<<b>>◆ ここがポイント<</b>>\n${featLines}\n\n`+
`<<b>>◆ 募集要項<</b>>\n`+
`　時給：${wage}\n　勤務時間：${time}\n　勤務地：${place}\n　対象：${tgt}を歓迎します${greet}\n\n`+
`<<b>>◆ こんな方にオススメ<</b>>\n`+
`・コツコツ・もくもく作業が好きな方\n・自分のペースで働きたい方\n・安定して長く働きたい方\n\nまずはお気軽にご応募ください${greet} 株式会社エヌエフエーがあなたの「働く」をサポートします${greet}`;

  docs.scout=
`<<b>>${tgt}へ｜${job}のご案内<</b>>\n\n`+
`はじめまして、株式会社エヌエフエーです${greet}\nあなたのご経験・ご希望を拝見し、ぜひご紹介したいお仕事がありご連絡しました${greet}\n\n`+
`◎ ${job}（${place}）\n◎ ${wage}／${time}\n◎ ${featInline}\n\n`+
`「${tgt}歓迎」のお仕事で、研修とフォロー体制が整っています${greet}\nご経験がなくても、専任担当が就業開始から定着まで伴走しますのでご安心ください${greet}\n\n`+
`少しでもご興味があれば、オンライン面談（15分）も可能です${greet}\nご都合のよい日時をお聞かせいただけますでしょうか？\n\n― 株式会社エヌエフエー 人材サポート担当`;

  docs.sns=
`<<catch>>${catch_}<</catch>>\n\n`+
`📍${place}\n💰${wage}\n🕒${time}\n🙆 ${tgt}歓迎\n\n`+
`${f.slice(0,5).map(x=>"#"+x.replace(/[・・\s]/g,"")).join(" ")} #大田区バイト #蒲田 #求人 #NFA\n\n`+
`応募はプロフィールのリンクから👆`;

  tab(cur);
  document.getElementById("bar").style.display="flex";
  document.getElementById("note").innerHTML="※ 本デモはテンプレート方式の簡易生成です。<strong>実装版はClaude APIと連携</strong>し、過去の応募実績が高い原稿を学習して、より自然で訴求力の高い文章を媒体ごとに最適生成します。";
}
function tab(t){cur=t;
  document.querySelectorAll(".tab").forEach(e=>e.classList.toggle("on",e.dataset.t===t));
  const raw=docs[t]||"";
  const html=raw
    .replace(/<<catch>>([\s\S]*?)<<\/catch>>/g,'<div class="catch">$1</div>')
    .replace(/<<b>>([\s\S]*?)<<\/b>>/g,'<strong>$1</strong>')
    ;
  document.getElementById("doc").innerHTML=html;
}
function copyDoc(){
  const raw=(docs[cur]||"").replace(/<<\/?catch>>/g,"").replace(/<<\/?b>>/g,"");
  navigator.clipboard.writeText(raw).then(()=>{const c=document.querySelector('.copy');c.textContent="✓ コピーしました";setTimeout(()=>c.textContent="📋 コピー",1500)});
}
function val(id){return document.getElementById(id).value}
</script>
</body>
</html>
