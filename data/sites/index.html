<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>リニューアル提案デモ一覧</title>
  <meta name="robots" content="noindex" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{font-feature-settings:"palt"}.line-clamp-2{display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}</style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased">
  <header class="bg-slate-900 py-12 text-white">
    <div class="mx-auto max-w-6xl px-6">
      <h1 class="text-2xl font-bold sm:text-3xl">Webサイトリニューアル提案デモ</h1>
      <p class="mt-3 text-slate-300">各社向けに作成したデモサイトの一覧です（2件）。カードから個別デモを開けます。</p>
    </div>
  </header>
  <main class="mx-auto max-w-6xl px-6 py-12">
    <div class="grid grid-cols-1 gap-6 sm:grid-cols-2 lg:grid-cols-3">
      <a href="./memorial-sample/index.html" class="group block overflow-hidden rounded-xl border border-slate-200 bg-white transition hover:-translate-y-1 hover:shadow-lg">
        <div class="h-28" style="background:linear-gradient(135deg, #2f6b4f 0%, #1f4a37 100%)"></div>
        <div class="p-5">
          <span class="text-xs font-medium text-slate-500">霊園・墓石</span>
          <h2 class="mt-1 text-lg font-semibold text-slate-900 group-hover:underline">みどりメモリアル霊園</h2>
          <p class="mt-2 line-clamp-2 text-sm text-slate-600">宗旨宗派への配慮と費用透明性で、安心して相談できる霊園サイト / 見学予約まで迷わず進める導線設計</p>
          <span class="mt-4 inline-flex items-center gap-1 text-sm font-semibold text-slate-700">デモを開く <span aria-hidden="true">→</span></span>
        </div>
      </a>
      <a href="./sample/index.html" class="group block overflow-hidden rounded-xl border border-slate-200 bg-white transition hover:-translate-y-1 hover:shadow-lg">
        <div class="h-28" style="background:linear-gradient(135deg, #b9772b 0%, #8a591f 100%)"></div>
        <div class="p-5">
          <span class="text-xs font-medium text-slate-500">建設・工務店</span>
          <h2 class="mt-1 text-lg font-semibold text-slate-900 group-hover:underline">サンプル工務店</h2>
          <p class="mt-2 line-clamp-2 text-sm text-slate-600">安心して相談できる地域No.1の工務店サイト / 施工事例から問い合わせまでの導線を短縮</p>
          <span class="mt-4 inline-flex items-center gap-1 text-sm font-semibold text-slate-700">デモを開く <span aria-hidden="true">→</span></span>
        </div>
      </a>
    </div>
  </main>
  <footer class="py-10 text-center text-xs text-slate-400">Demo redesign concept — 営業提案用デモの一覧ページです。</footer>
</body>
</html>
